<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS - Ficha de Personagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. IMPORTAÇÃO DAS FONTES OFICIAIS (.otf) */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        /* 2. TIPOGRAFIA E FUNDO BASE */
        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            font-size: 1.1rem;
        }

        h1, h2, h3, h4, h5, h6, .fonte-leopold, .btn-blue, .nav-link, .atributo-label {
            font-family: 'LeopoldMedium', sans-serif;
            letter-spacing: 1px;
        }

        /* 3. HEADER DA FICHA */
        .pactos-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px;
            background: linear-gradient(90deg, #020617 0%, #1e3a8a 100%);
            border-bottom: 1px solid #1b48ae;
            box-shadow: 0 4px 25px rgba(29, 78, 216, 0.4);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 20px; z-index: 2; }
        .header-right { display: flex; align-items: center; z-index: 2; }

        .menu-btn {
            background: transparent; border: none; color: #0050af;
            font-size: 2.2rem; cursor: pointer; transition: 0.3s;
        }
        .menu-btn:hover { color: #ffffff; transform: scale(1.1); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .btn-home { color: #3b82f6; transition: 0.3s; text-decoration: none; display: flex; align-items: center;}
        .btn-home:hover { color: #ffffff; transform: scale(1.1); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-home svg { width: 30px; height: 30px; }

        /* LOGO CENTRALIZADA E COM TRUQUE DE FUNDO TRANSPARENTE */
        .pactos-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .pactos-logo img {
            height: 45px; width: auto;
            filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.6));
            mix-blend-mode: lighten;
        }

        /* Bolinha de Perfil na Header */
        .profile-pic-placeholder {
            width: 45px; height: 45px; background-color: #0f172a;
            border-radius: 50%; border: 2px solid #3b82f6;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            display: flex; justify-content: center; align-items: center;
        }
        .profile-pic-placeholder:hover { border-color: #60a5fa; transform: scale(1.1); box-shadow: 0 0 20px rgba(96, 165, 250, 0.8); }

        /* Botões Azuis Escuros */
        .btn-blue {
            background-color: #2563eb; color: white; border: none; font-size: 1.2rem;
            padding: 8px 30px; transition: 0.3s; border-radius: 6px; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(11, 28, 62, 0.5);
        }
        .btn-blue:hover { background-color: #132750; color: white; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.6); }

        .btn-outline-blue { color: #3b82f6; border-color: #1e3a8a; background: transparent; }
        .btn-outline-blue:hover { background-color: #1e3a8a; color: white; }

        /* 4. DESIGN DO MENU LATERAL (SIDEBAR) */
        .sidebar {
            height: 100vh; width: 0; position: fixed; top: 0; left: 0;
            background: linear-gradient(180deg, #020617 0%, #1e3a8a 100%);
            border-right: 1px solid #3b82f6;
            box-shadow: 5px 0 25px rgba(29, 78, 216, 0.4);
            overflow-x: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1040; display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); }
        .sidebar-header img { width: 140px; filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.6)); mix-blend-mode: lighten; }
        .sidebar-menu { list-style: none; padding: 20px 0; margin: 0; flex-grow: 1; }
        .sidebar-menu li a {
            padding: 15px 30px; text-decoration: none; font-size: 1.2rem;
            color: #dbeafe; display: block; transition: 0.3s;
            font-family: 'LeopoldMedium', sans-serif; text-transform: uppercase;
        }
        .sidebar-menu li a:hover { color: #ffffff; background-color: rgba(59, 130, 246, 0.2); border-left: 5px solid #60a5fa; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .sidebar-menu li a.inativo { color: #64748b; cursor: default; }
        .sidebar-menu li a.inativo:hover { background-color: transparent; border-left: none; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(4px);
            z-index: 1030; display: none; opacity: 0; transition: opacity 0.4s;
        }
        .overlay.active { display: block; opacity: 1; }

        /* 5. LAYOUT DA FICHA */
        .ficha-container { max-width: 1400px; margin: 0 auto; padding: 40px 30px; }

        .info-box { background-color: #0f172a; padding: 25px; border-radius: 12px; border: 1px solid #1e3a8a; box-shadow: 0 10px 25px rgba(2, 6, 23, 0.8); height: 100%; }

        /* UPLOAD DE AVATAR */
        .avatar-preview {
            width: 140px; height: 140px; border-radius: 50%; border: 3px dashed #1e3a8a;
            background-color: #080b12; background-image: url('https://via.placeholder.com/140/080b12/888888?text=FOTO');
            background-size: cover; background-position: center; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            margin: 0 auto 25px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .avatar-preview:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(30, 58, 138, 0.6); }
        .avatar-preview::after {
            content: '📷 Trocar'; position: absolute; bottom: 0; background: rgba(2, 6, 23, 0.85);
            color: white; width: 100%; text-align: center; font-size: 0.9rem; padding: 5px 0;
            opacity: 0; transition: 0.3s; font-family: 'BloggerSansRegular';
        }
        .avatar-preview:hover::after { opacity: 1; }

        /* Campos de Input Genéricos */
        .form-control { background-color: #080b12; border: 1px solid #1e3a8a; color: white; transition: 0.3s; }
        .form-control:focus { background-color: #0f172a; border-color: #3b82f6; color: white; box-shadow: 0 0 8px rgba(30, 58, 138, 0.5); }
        .form-control[readonly] { background-color: #040812; color: #64748b; }
        label { color: #94a3b8; font-size: 1rem; margin-bottom: 5px; }
        .section-title { color: #ffffff; text-shadow: 0 0 10px rgba(30, 58, 138, 0.8); text-align: center; margin-bottom: 25px; font-size: 1.8rem; }

        /* =========================================================
            A MÁGICA DA ESTRELA DE ATRIBUTOS (COM PROPORÇÃO REAL)
            ========================================================= */
        .estrela-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }

        .estrela-img {
            width: 200%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .ponta-atributo {
            position: absolute;
            width: 80px; height: 80px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transform: translate(-50%, -50%);
        }

        .ponta-will { top: 24%; left: 51%; }
        .ponta-agi  { top: 40%; left: 78%; }
        .ponta-int  { top: 67%; left: 82%; }
        .ponta-car  { top: 81%; left: 49%; }
        .ponta-con  { top: 67%; left: 22%; }
        .ponta-rig  { top: 40%; left: 23%; }
        .ponta-meio { top: 51%; left: 50%; }

        .estrela-label {
            color: #60a5fa;
            font-size: 1.2rem;
            margin-bottom: -5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
            font-family: 'LeopoldMedium';
            z-index: 2;
        }

        .estrela-input {
            width: 100%; text-align: center; font-size: 2.6rem;
            border: none; background: transparent; color: white;
            transition: 0.3s; font-family: 'LeopoldMedium';
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            z-index: 2;
        }
        .estrela-input:focus { outline: none; text-shadow: 0 0 15px rgba(96, 165, 250, 1); }
        .estrela-input[readonly] { cursor: not-allowed; }
        .input-meio { font-size: 3.8rem; color: #93c5fd; margin-top: 10px; text-shadow: 0 0 15px rgba(255,193,7,0.6); }

        /* BARRAS DE STATUS */
        .bar-container { position: relative; height: 35px; background-color: #080b12; border-radius: 6px; margin-bottom: 10px; overflow: hidden; border: 1px solid #1e3a8a; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        .bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bar-text { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            text-align: center; font-size: 1.2rem; line-height: 35px; 
            color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); 
            pointer-events: none; font-family: 'LeopoldMedium'; letter-spacing: 1px;
            z-index: 5; 
        }

        .bg-vida { background: linear-gradient(90deg, #5a0000, #dc3545); }
        .bg-sanidade { background: linear-gradient(90deg, #001f5c, #0d6efd); }
        .bg-energia { background: linear-gradient(90deg, #8a6700, #ffc107); color: black; text-shadow: none; }
        .bg-pecaminosa { background: linear-gradient(90deg, #2a0000, #660000); color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        .status-inputs input { text-align: center; font-family: 'LeopoldMedium'; font-size: 1.3rem; background-color: #080b12; color: white; border: 1px solid #1e3a8a; border-radius: 4px; padding: 5px; width: 70px;}
        .status-inputs input:focus { border-color: #3b82f6; outline: none; }
        .status-inputs input[readonly] { background-color: #040812; color: #64748b; border-color: #1b306b; }

        /* ABAS E TABELAS */
        .nav-tabs { border-bottom: 1px solid #1e3a8a; margin-top: 40px; }
        .nav-tabs .nav-link { color: #64748b; border: none; font-size: 1.3rem; padding: 15px 25px; transition: 0.3s; }
        .nav-tabs .nav-link:hover { color: #cbd5e1; }
        .nav-tabs .nav-link.active { background-color: transparent; color: #60a5fa; border-bottom: 3px solid #3b82f6; text-shadow: 0 0 8px rgba(30, 58, 138, 0.6);}

        .tab-content { background-color: #0f172a; border: 1px solid #1e3a8a; border-top: none; padding: 30px; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(2, 6, 23, 0.8);}
        .search-line { border: none; border-bottom: 2px solid #032660; background: transparent; color: white; border-radius: 0; padding: 8px 0; width: 100%; transition: 0.3s; font-size: 1.1rem; }
        .search-line:focus { outline: none; border-color: #3b82f6; }

        .item-list-box { background-color: #080b12; border-radius: 6px; margin-bottom: 10px; border: 1px solid #1e3a8a; }
        .item-header { padding: 15px; cursor: pointer; display: flex; align-items: center; color: #e0e0e0; transition: background 0.2s; }
        .item-header:hover { background-color: #0f172a; }
        .item-body { padding: 15px; border-top: 1px solid #1e3a8a; background-color: #020617; display: none; }
        .item-title-input { background: transparent; border: none; color: white; font-family: 'LeopoldMedium'; font-size: 1.3rem; width: 100%; outline: none; }
        .item-title-input:focus { border-bottom: 1px solid #3b82f6; }
        .chevron { transition: transform 0.3s ease; margin-right: 15px; color: #60a5fa; font-family: 'LeopoldMedium'; }

        .pericias-header { display: flex; font-family: 'LeopoldMedium'; font-size: 1.2rem; border-bottom: 2px solid #1e3a8a; padding-bottom: 15px; margin-bottom: 15px; color: #60a5fa; }
        .pericia-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e3a8a; transition: 0.2s; }
        .pericia-row:hover { background-color: #080b12; }
        .pericia-nome { flex: 3; color: #e0e0e0; font-family: 'LeopoldMedium'; font-size: 1.2rem; }
        .pericia-atb { flex: 2; color: #94a3b8; text-align: center; font-size: 1rem; }
        .pericia-treino { flex: 1.5; display: flex; justify-content: center; }
        .pericia-treino select { background-color: #0f172a; color: white; border: 1px solid #1e3a8a; border-radius: 4px; padding: 4px 8px; outline: none; cursor: pointer; }
        .pericia-treino select:focus { border-color: #3b82f6; }
        .pericia-bonus { flex: 1.5; display: flex; justify-content: center; }
        .pericia-bonus input { width: 45px; background: transparent; border: none; border-bottom: 1px solid #1e3a8a; color: white; text-align: center; outline: none; font-family: 'LeopoldMedium'; font-size: 1.2rem;}
        .pericia-bonus input:focus { border-bottom-color: #3b82f6; }
        .pericia-total { flex: 1.5; text-align: center; font-family: 'LeopoldMedium'; font-size: 1.4rem; color: #60a5fa; }

        /* =========================================================
            STATUS EXTRAS: RD, VELOCIDADE, DESLOCAMENTO
            ========================================================= */
        .extra-status-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 35px;
            padding: 0 5px;
        }

        .extra-status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .extra-status-label {
            color: #94a3b8;
            font-family: 'LeopoldMedium';
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .extra-bg-shape {
            position: relative;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .extra-bg-rd {
            background-image: url('assets/rd.png');
            width: 75px; height: 85px;
        }

        .extra-bg-vel {
            background-image: url('assets/velocidade.png');
            width: 80px; height: 85px;
        }

        .extra-bg-desl {
            background-image: url('assets/deslocamento.png');
            width: 120px; height: 45px;
        }

        .extra-input {
            position: absolute;
            width: 80%;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 1.8rem;
            font-family: 'LeopoldMedium';
            outline: none;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
            transform: translate(-50%, -50%);
        }

        .extra-input:focus { text-shadow: 0 0 10px rgba(96, 165, 250, 1); }
        .extra-input[readonly] { cursor: not-allowed; text-shadow: none; color: #94a3b8; }

        .num-pos-rd   { top: 50%; left: 60%; }
        .num-pos-vel  { top: 62%; left: 60%; }
        .num-pos-desl { top: 50%; left: 55%; }
    </style>
</head>
<body>

<div id="pactosSidebar" class="sidebar">
    <div class="sidebar-header">
        <img src="assets/PACTOS.png" alt="PACTOS RPG">
    </div>
    <ul class="sidebar-menu">
        <li><a href="home.html">INÍCIO</a></li>
        <li><a href="perfil.html">MEU PERFIL</a></li>
        <li><a href="fichas.html">AGENTES</a></li>
        <li><a href="#" class="inativo">CAMPANHAS (EM BREVE)</a></li>
    </ul>
    <div style="padding: 20px; border-top: 1px solid rgba(59, 130, 246, 0.3); margin-top: auto;">
        <button onclick="fazerLogout()" class="btn btn-outline-danger w-100" style="font-family: 'LeopoldMedium'; font-size: 1.2rem; border-width: 2px;">SAIR</button>
    </div>
</div>
<div id="menuOverlay" class="overlay" onclick="toggleMenu()"></div>

<header class="pactos-header">
    <div class="header-left">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <a href="fichas.html" class="btn-home" title="Voltar para Meus Agentes">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"></path>
            </svg>
        </a>
    </div>

    <div class="pactos-logo">
        <img src="assets/PACTOS.png" alt="PACTOS RPG">
    </div>

    <div class="header-right">
        <button onclick="salvarFicha()" class="btn btn-blue">SALVAR FICHA</button>
    </div>
</header>

<div class="ficha-container">
    <div class="row g-4">

        <div class="col-lg-4">
            <div class="info-box">
                <div class="avatar-upload-container text-center">
                    <input type="file" id="inputFoto" accept="image/*" style="display: none;" onchange="enviarParaNuvem(event)">
                    <div class="avatar-preview" id="imagemPreview" onclick="document.getElementById('inputFoto').click()"></div>
                </div>

                <div class="mb-3">
                    <label>Nome do Personagem</label>
                    <input type="text" id="ficha-nome" class="form-control" placeholder="Digite o nome...">
                </div>
                <div class="mb-3">
                    <label>Jogador</label>
                    <input type="text" id="ficha-jogador" class="form-control" placeholder="Seu nome...">
                </div>
                <div class="mb-3">
                    <label>Origem</label>
                    <input type="text" id="ficha-origem" class="form-control" placeholder="Sua origem...">
                </div>
                <div class="row g-2">
                    <div class="col-6">
                        <label>Nível</label>
                        <input type="number" id="ficha-nivel" class="form-control" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="col-6">
                        <label>Idade</label>
                        <input type="number" id="ficha-idade" class="form-control" placeholder="Anos" oninput="calcularStatusAutomaticos()">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="info-box d-flex flex-column justify-content-center align-items-center">
                <h2 class="section-title fonte-leopold">ATRIBUTOS</h2>

                <div class="estrela-container">
                    <img src="assets/atbpactos.png" alt="Estrela de Atributos" class="estrela-img">

                    <div class="ponta-atributo ponta-will">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-will" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="ponta-atributo ponta-agi">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-agi" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="ponta-atributo ponta-int">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-int" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="ponta-atributo ponta-car">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-car" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="ponta-atributo ponta-con">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-con" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>
                    <div class="ponta-atributo ponta-rig">
                        <div class="estrela-label"></div>
                        <input type="number" id="attr-rig" class="estrela-input" value="0" oninput="calcularStatusAutomaticos()">
                    </div>

                    <div class="ponta-atributo ponta-meio" id="ev-meio-container" style="display: none;">
                        <input type="number" id="attr-meio" class="estrela-input input-meio" value="0" readonly>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="info-box d-flex flex-column justify-content-center">
                <h2 class="section-title fonte-leopold">STATUS</h2>

                <div class="bar-container">
                    <div class="bar-fill bg-vida" id="barra-vida" style="width: 100%;"></div>
                    <div class="bar-text" id="texto-vida">Pontos de Vida (PV) - 10/10</div>
                </div>
                <div class="d-flex justify-content-between mb-4 status-inputs">
                    <input type="number" id="atual-vida" value="10" oninput="atualizarBarra('vida')">
                    <input type="number" id="maximo-vida" value="10" readonly>
                </div>

                <div class="bar-container">
                    <div class="bar-fill bg-sanidade" id="barra-sanidade" style="width: 100%;"></div>
                    <div class="bar-text" id="texto-sanidade">Sanidade (SAN) - 70/70</div>
                </div>
                <div class="d-flex justify-content-between mb-4 status-inputs">
                    <input type="number" id="atual-sanidade" value="70" oninput="atualizarBarra('sanidade')">
                    <input type="number" id="maximo-sanidade" value="70" readonly>
                </div>

                <div id="ev-bar-container" style="display: none;">
                    <div class="bar-container">
                        <div class="bar-fill bg-energia" id="barra-energia" style="width: 100%;"></div>
                        <div class="bar-text" id="texto-energia">Energia Vital (EV) - 1/1</div>
                    </div>
                    <div class="d-flex justify-content-between mb-2 status-inputs">
                        <input type="number" id="atual-energia" value="1" oninput="atualizarBarra('energia')">
                        <input type="number" id="maximo-energia" value="1" readonly>
                    </div>
                </div>

                <div class="extra-status-container">
                    
                    <div class="extra-status-item">
                        <div class="extra-status-label">RD</div>
                        <div class="extra-bg-shape extra-bg-rd">
                            <input type="number" id="status-rd" class="extra-input num-pos-rd" value="0" readonly>
                        </div>
                    </div>

                    <div class="extra-status-item">
                        <div class="extra-status-label">VEL</div>
                        <div class="extra-bg-shape extra-bg-vel">
                            <input type="number" id="status-velocidade" class="extra-input num-pos-vel" value="0" readonly>
                        </div>
                    </div>

                    <div class="extra-status-item">
                        <div class="extra-status-label">DESL</div>
                        <div class="extra-bg-shape extra-bg-desl">
                            <input type="number" id="status-deslocamento" class="extra-input num-pos-desl" value="0">
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <ul class="nav nav-tabs fonte-leopold" id="fichaTabs" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pericias" type="button" role="tab">PERÍCIAS</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pactos" type="button" role="tab">PACTOS</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#inventario" type="button" role="tab">INVENTÁRIO</button></li>
    </ul>

    <div class="tab-content" id="fichaTabsContent">
        <div class="tab-pane fade show active" id="pericias" role="tabpanel">
            <div class="pericias-header">
                <div style="flex: 3;">Perícia</div>
                <div style="flex: 2; text-align: center;">Atributo</div>
                <div style="flex: 1.5; text-align: center;">Treino</div>
                <div style="flex: 1.5; text-align: center;">Bônus</div>
                <div style="flex: 1.5; text-align: center;">Total</div>
            </div>
            <div id="lista-pericias"></div>
        </div>
        <div class="tab-pane fade" id="pactos" role="tabpanel">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div class="w-50"><input type="text" id="buscaPactos" class="search-line" placeholder="Filtrar pactos..."></div>
                <div class="d-flex flex-column align-items-end"><button class="btn btn-outline-blue btn-sm py-2 px-3 fonte-leopold" onclick="adicionarItem('pactos')">NOVO PACTO</button></div>
            </div>
            <div id="lista-pactos"></div>
        </div>
        <div class="tab-pane fade" id="inventario" role="tabpanel">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div class="w-50"><input type="text" id="buscaInventario" class="search-line" placeholder="Filtrar itens..."></div>
                <div class="d-flex flex-column align-items-end"><button class="btn btn-outline-blue btn-sm py-2 px-3 fonte-leopold" onclick="adicionarItem('inventario')">NOVO ITEM</button></div>
            </div>
            <div id="lista-inventario"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleMenu() {
        const sidebar = document.getElementById("pactosSidebar");
        const overlay = document.getElementById("menuOverlay");
        if (sidebar.style.width === "300px") {
            sidebar.style.width = "0";
            overlay.classList.remove("active");
            setTimeout(() => overlay.style.display = "none", 400);
        } else {
            overlay.style.display = "block";
            setTimeout(() => overlay.classList.add("active"), 10);
            sidebar.style.width = "300px";
        }
    }

    function fazerLogout() {
        if(confirm("Tem certeza que deseja sair da sua conta?")) {
            localStorage.removeItem('usuarioLogado');
            window.location.href = "login.html";
        }
    }

    function adicionarItem(abaId) {
        const container = document.getElementById(`lista-${abaId}`);
        const itemId = Date.now();
        const itemHTML = `
            <div class="item-list-box" id="item-${itemId}">
                <div class="item-header" onclick="toggleItem(${itemId})">
                    <span class="chevron" id="chevron-${itemId}">v</span>
                    <input type="text" class="item-title-input" value="Nova Habilidade" onclick="event.stopPropagation()">
                </div>
                <div class="item-body" id="body-${itemId}">
                    <textarea class="form-control bg-dark text-white border-secondary mb-3" rows="3" placeholder="Descreva os efeitos e regras aqui..."></textarea>
                    <div class="d-flex justify-content-end">
                        <button class="btn btn-sm btn-danger fonte-leopold px-3" onclick="removerItem(${itemId})">EXCLUIR</button>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', itemHTML);
    }

    function toggleItem(id) {
        const body = document.getElementById(`body-${id}`);
        const chevron = document.getElementById(`chevron-${id}`);
        if (body.style.display === 'block') { body.style.display = 'none'; chevron.style.transform = 'rotate(0deg)';
        } else { body.style.display = 'block'; chevron.style.transform = 'rotate(180deg)'; }
    }

    function removerItem(id) { document.getElementById(`item-${id}`).remove(); }

    const periciasBase = [
        { nome: "Atletismo", atb: "CON / WILL" }, { nome: "Atualidades", atb: "INT / CAR" },
        { nome: "Atuação", atb: "INT / CAR" }, { nome: "Ciências", atb: "INT" },
        { nome: "Diplomacia", atb: "INT / CAR" }, { nome: "Enganação", atb: "INT / CAR" },
        { nome: "Fortitude", atb: "CON / WILL" }, { nome: "Furtividade", atb: "AGI" },
        { nome: "Iniciativa", atb: "AGI" }, { nome: "Intimidação", atb: "INT / CAR" },
        { nome: "Intuição", atb: "INT" }, { nome: "Investigação", atb: "INT / WILL" },
        { nome: "Medicina", atb: "INT / WILL" }, { nome: "Lábia", atb: "CAR / AGI" },
        { nome: "Luta", atb: "RIG / WILL" }, { nome: "Pilotagem", atb: "AGI / WILL" },
        { nome: "Pontaria", atb: "AGI / WILL" }, { nome: "Profissão", atb: "INT" },
        { nome: "Percepção", atb: "AGI / WILL" }, { nome: "Persuasão", atb: "CAR / INT" },
        { nome: "Prestidigitação", atb: "AGI / CAR" }, { nome: "Reflexo", atb: "AGI / WILL" },
        { nome: "Religião", atb: "INT / WILL" }, { nome: "Sobrevivência", atb: "INT / WILL" },
        { nome: "Tática", atb: "INT" }, { nome: "Tecnologia", atb: "INT" }, { nome: "Vontade", atb: "WILL" }
    ];

    function renderizarPericias() {
        const container = document.getElementById('lista-pericias');
        let html = '';
        periciasBase.forEach((p, index) => {
            html += `
            <div class="pericia-row">
                <div class="pericia-nome">🎲 ${p.nome}</div>
                <div class="pericia-atb">( ${p.atb} )</div>
                <div class="pericia-treino">
                    <select id="treino-${index}" onchange="calcularPericia(${index})">
                        <option value="0">0</option> <option value="5">5</option>
                        <option value="10">10</option> <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
                <div class="pericia-bonus"><input type="number" id="bonus-${index}" value="0" oninput="calcularPericia(${index})"></div>
                <div class="pericia-total" id="total-${index}">0</div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function calcularPericia(index) {
        const treino = parseInt(document.getElementById(`treino-${index}`).value) || 0;
        const bonus = parseInt(document.getElementById(`bonus-${index}`).value) || 0;
        document.getElementById(`total-${index}`).innerText = treino + bonus;
    }

    renderizarPericias();

    // --- NOVA FUNÇÃO DE MATEMÁTICA AUTOMÁTICA ---
    function calcularStatusAutomaticos() {
        const pegarInt = (id) => parseInt(document.getElementById(id).value) || 0;

        const idade = pegarInt('ficha-idade');
        const nivel = pegarInt('ficha-nivel');
        
        const will = pegarInt('attr-will');
        const agi = pegarInt('attr-agi');
        const int = pegarInt('attr-int');
        const car = pegarInt('attr-car');
        const con = pegarInt('attr-con');
        const rig = pegarInt('attr-rig');

        // 1. Cálculo de Vida (Tabela de Idade Oficial PACTOS)
        let pvBase = 10; // Padrão para caso fique vazio ou negativo

        if (idade >= 0 && idade <= 9) {
            pvBase = 10;
        } else if (idade >= 10 && idade <= 14) {
            pvBase = 15;
        } else if (idade >= 15 && idade <= 19) {
            pvBase = 25;
        } else if (idade >= 20 && idade <= 29) {
            pvBase = 35;
        } else if (idade >= 30 && idade <= 39) {
            pvBase = 45;
        } else if (idade >= 40 && idade <= 49) {
            pvBase = 40;
        } else if (idade >= 50) {
            pvBase = 35;
        }
        
        // Aplica a fórmula: PV Base + CON + RIG
        document.getElementById('maximo-vida').value = pvBase + con + rig;
        atualizarBarra('vida');

        // 2. Cálculo de Sanidade
        document.getElementById('maximo-sanidade').value = 70 + will;
        atualizarBarra('sanidade');

        // 3. Sistema de Energia Vital (EV) / Pecaminosa (EP)
        const evMaximo = will + agi + int + car + con + rig;
        document.getElementById('attr-meio').value = evMaximo;
        document.getElementById('maximo-energia').value = evMaximo;
        
        const evBarContainer = document.getElementById('ev-bar-container');
        const evMeioContainer = document.getElementById('ev-meio-container');
        
        // Só aparece do nível 50 pra cima
        if (nivel >= 50) {
            evBarContainer.style.display = 'block';
            evMeioContainer.style.display = 'flex';
        } else {
            evBarContainer.style.display = 'none';
            evMeioContainer.style.display = 'none';
        }
        atualizarBarra('energia');

        // 4. Defesa, Velocidade e Deslocamento
        document.getElementById('status-rd').value = 6 + con + will;
        document.getElementById('status-velocidade').value = 9 + con + agi;
        
        const deslInput = document.getElementById('status-deslocamento');
        if (deslInput.value === "0" || deslInput.value === "") {
            deslInput.value = 9; // Valor padrão se estiver vazio
        }
    }

    // --- NOVA FUNÇÃO ATUALIZAR BARRA (COM ENERGIA PECAMINOSA) ---
    function atualizarBarra(tipo) {
        const atual = parseInt(document.getElementById(`atual-${tipo}`).value) || 0;
        const maximo = parseInt(document.getElementById(`maximo-${tipo}`).value) || 1;
        let porcentagem = (atual / maximo) * 100;
        let barra = document.getElementById(`barra-${tipo}`);
        
        if (tipo === 'vida') {
            if (porcentagem > 100) porcentagem = 100;
            if (porcentagem < 0) porcentagem = 0;
            barra.style.width = `${porcentagem}%`;
            document.getElementById(`texto-${tipo}`).innerText = `Pontos de Vida (PV) - ${atual}/${maximo}`;
        }
        else if (tipo === 'sanidade') {
            if (porcentagem > 100) porcentagem = 100;
            if (porcentagem < 0) porcentagem = 0;
            barra.style.width = `${porcentagem}%`;
            document.getElementById(`texto-${tipo}`).innerText = `Sanidade (SAN) - ${atual}/${maximo}`;
        }
        else if (tipo === 'energia') {
            // A MÁGICA DA ENERGIA PECAMINOSA (Valores Negativos ou Zero)
            if (atual <= 0) {
                let ep = Math.abs(atual); // Transforma -5 em 5 positivos
                let percEP = (ep / maximo) * 100;
                if (percEP > 100) percEP = 100;
                
                barra.style.width = `${percEP}%`;
                barra.className = 'bar-fill bg-pecaminosa'; // Fica Vermelho Sangue
                document.getElementById(`texto-${tipo}`).innerText = `Energia Pecaminosa (EP) - ${ep}/${maximo}`;
            } else {
                if (porcentagem > 100) porcentagem = 100;
                barra.style.width = `${porcentagem}%`;
                barra.className = 'bar-fill bg-energia'; // Fica Dourado Normal
                document.getElementById(`texto-${tipo}`).innerText = `Energia Vital (EV) - ${atual}/${maximo}`;
            }
        }
    }

    function empacotarLista(abaId) {
        const container = document.getElementById(`lista-${abaId}`);
        const itens = container.querySelectorAll('.item-list-box');
        let pacote = [];
        itens.forEach(item => {
            const titulo = item.querySelector('.item-title-input').value;
            const descricao = item.querySelector('textarea').value;
            pacote.push({ titulo, descricao });
        });
        return JSON.stringify(pacote);
    }

    function desempacotarLista(abaId, dadosJson) {
        if (!dadosJson) return;
        const itensSalvos = JSON.parse(dadosJson);
        const container = document.getElementById(`lista-${abaId}`);
        container.innerHTML = '';
        itensSalvos.forEach(item => {
            const itemId = Date.now() + Math.random().toString().substring(2, 8);
            const itemHTML = `
                <div class="item-list-box" id="item-${itemId}">
                    <div class="item-header" onclick="toggleItem('${itemId}')">
                        <span class="chevron" id="chevron-${itemId}">v</span>
                        <input type="text" class="item-title-input" value="${item.titulo}" onclick="event.stopPropagation()">
                    </div>
                    <div class="item-body" id="body-${itemId}">
                        <textarea class="form-control bg-dark text-white border-secondary mb-3" rows="3">${item.descricao}</textarea>
                        <div class="d-flex justify-content-end">
                            <button class="btn btn-sm btn-danger fonte-leopold px-3" onclick="removerItem('${itemId}')">EXCLUIR</button>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', itemHTML);
        });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const agenteId = urlParams.get('id');
    const usuarioLogado = localStorage.getItem('usuarioLogado');

    if (!usuarioLogado || !agenteId) {
        alert("Acesso negado. Retornando ao painel."); window.location.href = "fichas.html";
    }

    function configurarFiltro(idInput, idLista) {
        const caixaPesquisa = document.getElementById(idInput);
        if (!caixaPesquisa) return;
        caixaPesquisa.addEventListener('input', function(evento) {
            const textoPesquisa = evento.target.value.toLowerCase();
            const itensDaLista = document.querySelectorAll(`#${idLista} .item-list-box`);
            itensDaLista.forEach(item => {
                const titulo = item.querySelector('.item-title-input').value.toLowerCase();
                const descricao = item.querySelector('textarea').value.toLowerCase();
                if (titulo.includes(textoPesquisa) || descricao.includes(textoPesquisa)) { item.style.display = 'block'; }
                else { item.style.display = 'none'; }
            });
        });
    }

    configurarFiltro('buscaPactos', 'lista-pactos');
    configurarFiltro('buscaInventario', 'lista-inventario');

    async function carregarDadosDaFicha() {
        try {
            const resposta = await fetch(`/api/agentes/${agenteId}`);
            if (resposta.ok) {
                const ficha = await resposta.json();
                const preencherSeExistir = (id, valor) => { const elemento = document.getElementById(id); if (elemento) elemento.value = valor; };

                preencherSeExistir('ficha-nome', ficha.nome); preencherSeExistir('ficha-jogador', ficha.jogador);
                preencherSeExistir('ficha-origem', ficha.origem); preencherSeExistir('ficha-nivel', ficha.nivel);
                preencherSeExistir('ficha-idade', ficha.idade);
                preencherSeExistir('status-rd', ficha.rd);
                preencherSeExistir('status-velocidade', ficha.velocidade);
                preencherSeExistir('status-deslocamento', ficha.deslocamento);

                if (ficha.fotoUrl) {
                    linkFotoAgente = ficha.fotoUrl;
                    document.getElementById('imagemPreview').style.backgroundImage = `url('${ficha.fotoUrl}')`;
                }

                preencherSeExistir('atual-vida', ficha.vidaAtual); preencherSeExistir('maximo-vida', ficha.vidaMaxima);
                preencherSeExistir('atual-sanidade', ficha.sanidadeAtual); preencherSeExistir('maximo-sanidade', ficha.sanidadeMaxima);
                preencherSeExistir('atual-energia', ficha.energiaAtual); preencherSeExistir('maximo-energia', ficha.energiaMaxima);

                atualizarBarra('vida'); atualizarBarra('sanidade'); atualizarBarra('energia');

                if (ficha.periciasDados) {
                    const periciasSalvas = JSON.parse(ficha.periciasDados);
                    periciasSalvas.forEach((pericia, index) => {
                        const selectTreino = document.getElementById(`treino-${index}`);
                        const inputBonus = document.getElementById(`bonus-${index}`);
                        if (selectTreino) selectTreino.value = pericia.treino;
                        if (inputBonus) inputBonus.value = pericia.bonus;
                        calcularPericia(index);
                    });
                }

                desempacotarLista('pactos', ficha.pactosDados); desempacotarLista('inventario', ficha.inventarioDados);

                preencherSeExistir('attr-will', ficha.will); preencherSeExistir('attr-agi', ficha.agilidade);
                preencherSeExistir('attr-int', ficha.inteligencia); preencherSeExistir('attr-rig', ficha.forca);
                preencherSeExistir('attr-car', ficha.presenca); preencherSeExistir('attr-con', ficha.vigor);
                
                // MÁGICA ACONTECENDO AO CARREGAR O BANCO DE DADOS:
                calcularStatusAutomaticos();
                
            } else { alert("Ficha não encontrada."); }
        } catch (erro) { console.error("Erro:", erro); }
    }

    let linkFotoAgente = "";
    const IMGBB_API_KEY = "41d58ca7fde25e2553eb8a3f84e3ea9c";

    async function enviarParaNuvem(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;
        document.getElementById('imagemPreview').style.backgroundImage = "url('https://via.placeholder.com/140/080b12/888888?text=UP...')";
        const formData = new FormData(); formData.append("image", arquivo);
        try {
            const resposta = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const dados = await resposta.json();
            if (dados.success) {
                linkFotoAgente = dados.data.url;
                document.getElementById('imagemPreview').style.backgroundImage = `url('${linkFotoAgente}')`;
            } else { alert("Erro ao subir foto."); }
        } catch (erro) { console.error(erro); alert("Falha ao subir imagem."); }
    }

    async function salvarFicha() {
        const pegarValor = (id, tipoNum = true) => { const elemento = document.getElementById(id); if (elemento) return elemento.value; return tipoNum ? 0 : ""; };
        let pacotePericias = [];
        for (let i = 0; i < 27; i++) { pacotePericias.push({ treino: pegarValor(`treino-${i}`), bonus: pegarValor(`bonus-${i}`) }); }

        const dadosAtualizados = {
            nome: pegarValor('ficha-nome', false), fotoUrl: linkFotoAgente, jogador: pegarValor('ficha-jogador', false),
            origem: pegarValor('ficha-origem', false), nivel: pegarValor('ficha-nivel'), idade: pegarValor('ficha-idade'),
            vidaAtual: pegarValor('atual-vida'), vidaMaxima: pegarValor('maximo-vida'), sanidadeAtual: pegarValor('atual-sanidade'),
            sanidadeMaxima: pegarValor('maximo-sanidade'), energiaAtual: pegarValor('atual-energia'), energiaMaxima: pegarValor('maximo-energia'),
            rd: pegarValor('status-rd'), velocidade: pegarValor('status-velocidade'), deslocamento: pegarValor('status-deslocamento'),
            periciasDados: JSON.stringify(pacotePericias), pactosDados: empacotarLista('pactos'), inventarioDados: empacotarLista('inventario'),
            will: pegarValor('attr-will'), agilidade: pegarValor('attr-agi'), inteligencia: pegarValor('attr-int'),
            forca: pegarValor('attr-rig'), presenca: pegarValor('attr-car'), vigor: pegarValor('attr-con')
        };

        try {
            const resposta = await fetch(`/api/agentes/atualizar/${agenteId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dadosAtualizados)
            });
            if (resposta.ok) { alert("Ficha salva com sucesso!"); } else { alert("Erro ao salvar."); }
        } catch (erro) { console.error(erro); alert("Servidor offline."); }
    }

    carregarDadosDaFicha();
</script>
