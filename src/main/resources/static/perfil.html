<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Meu Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* Card Principal do Perfil */
        .profile-card {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* Título */
        .profile-title {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Área da Foto de Perfil */
        .profile-pic-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #2b2b2b;
            border: 3px dashed #a855f7;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            background-image: url('https://via.placeholder.com/150/2a2a2a/111111?text=Foto');
            background-size: cover;
            background-position: center;
        }

        .profile-pic:hover {
            border-color: #d8b4fe;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Efeito de hover escrito "Mudar Foto" */
        .profile-pic-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .profile-pic:hover .profile-pic-overlay { opacity: 1; }

        /* Estilização dos Inputs */
        .form-control {
            background-color: #151515;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus {
            border-color: #a855f7;
            box-shadow: 0 0 5px rgba(168, 85, 247, 0.3);
            background-color: #1a1a1a;
            color: white;
        }
        .form-control:disabled {
            background-color: #222;
            color: #777;
            border-color: #333;
            cursor: not-allowed;
        }

        /* Label do campo de Assinatura */
        .badge-premium {
            background-color: #a855f7;
            color: white;
            font-size: 0.7rem;
            padding: 3px 6px;
            border-radius: 4px;
            margin-left: 10px;
            vertical-align: middle;
        }

        /* Botões */
        .btn-purple {
            background-color: #a855f7; color: white; border: none; font-weight: bold; transition: 0.3s;
        }
        .btn-purple:hover { background-color: #9333ea; color: white; transform: translateY(-2px); }

        .btn-outline-secondary { border-color: #555; color: #aaa; transition: 0.3s; }
        .btn-outline-secondary:hover { background-color: #333; color: white; border-color: #666; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2 class="profile-title">GERENCIAR PERFIL</h2>

    <div class="profile-pic-container">
        <input type="file" id="inputFotoPerfil" accept="image/*" style="display: none;" onchange="enviarFotoPerfilParaNuvem(event)">

        <div class="profile-pic" id="imagemPreviewPerfil" onclick="document.getElementById('inputFotoPerfil').click()">
            <div class="profile-pic-overlay">Alterar</div>
        </div>

        <span class="text-muted mt-2 small">Clique na imagem para alterar</span>
    </div>

    <form onsubmit="salvarPerfil(event)">

        <div class="mb-3">
            <label class="form-label text-muted">Nome de Usuário</label>
            <input type="text" id="perfilNome" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted">E-mail de Contato</label>
            <input type="email" id="perfilEmail" class="form-control" required>
        </div>

        <div class="mb-4 p-3 border border-secondary rounded" style="background-color: #181818;">
            <label class="form-label text-muted d-flex align-items-center">
                Nível de Inclinação <span class="badge-premium">Em breve</span>
            </label>
            <input type="text" id="perfilInclinacao" class="form-control" value="Mundano (Padrão)" disabled>
            <small class="text-muted mt-2 d-block" style="font-size: 0.8rem;">
                Níveis superiores de inclinação garantirão bônus exclusivos. Esta configuração é gerenciada pelos administradores do sistema.
            </small>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <a href="fichas.html" class="btn btn-outline-secondary px-4">Voltar</a>
            <button type="submit" class="btn btn-purple px-4">Salvar Perfil</button>
        </div>
    </form>

</div>

<script>
    // Pega o nome do jogador salvo no navegador
    const usuarioLogado = localStorage.getItem('usuarioLogado');

    if (!usuarioLogado) {
        alert("Você precisa estar logado!");
        window.location.href = "login.html";
    }

    let linkFotoPerfil = "";
    const IMGBB_API_KEY = "41d58ca7fde25e2553eb8a3f84e3ea9c"; // Sua chave do ImgBB

    // Função para carregar os dados atuais ao abrir a tela
    async function carregarPerfil() {
        try {
            const resposta = await fetch(`/api/usuarios/${usuarioLogado}`);
            if (resposta.ok) {
                const dados = await resposta.json();
                // IDS CORRIGIDOS AQUI:
                document.getElementById('perfilNome').value = dados.nomeUsuario;
                document.getElementById('perfilEmail').value = dados.email;

                // Se o usuário já tiver foto salva, mostra ela na bolinha
                if (dados.fotoUrl) {
                    linkFotoPerfil = dados.fotoUrl;
                    document.getElementById('imagemPreviewPerfil').style.backgroundImage = `url('${linkFotoPerfil}')`;
                }
            } else {
                alert("Erro ao carregar dados do perfil.");
            }
        } catch (erro) {
            console.error(erro);
            alert("O erro real é: " + erro.message);
        }
    }

    // Função de upload para o ImgBB
    async function enviarFotoPerfilParaNuvem(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;

        document.getElementById('imagemPreviewPerfil').style.backgroundImage = "url('https://via.placeholder.com/120x120/1e1e1e/888888?text=UP...')";

        const formData = new FormData();
        formData.append("image", arquivo);

        try {
            const resposta = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const dados = await resposta.json();
            if (dados.success) {
                linkFotoPerfil = dados.data.url;
                document.getElementById('imagemPreviewPerfil').style.backgroundImage = `url('${linkFotoPerfil}')`;
            } else {
                alert("Erro ao subir a foto.");
            }
        } catch (erro) {
            console.error(erro);
            alert("Falha na conexão com o servidor de imagens.");
        }
    }

    // Função para salvar as alterações
    async function salvarPerfil(event) {
        event.preventDefault();

        // IDS CORRIGIDOS AQUI:
        const novoNome = document.getElementById('perfilNome').value;
        const novoEmail = document.getElementById('perfilEmail').value;

        // Colocando a fotoUrl no pacote que vai pro Java
        const dadosAtualizados = {
            nomeUsuario: novoNome,
            email: novoEmail,
            fotoUrl: linkFotoPerfil // O Java vai receber o link da foto!
        };

        try {
            const resposta = await fetch(`/api/usuarios/atualizar/${usuarioLogado}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dadosAtualizados)
            });

            if (resposta.ok) {
                alert("Perfil atualizado com sucesso!");
                // Se ele mudou de nome, precisamos atualizar a memória do navegador
                localStorage.setItem('usuarioLogado', novoNome);
                window.location.href = "fichas.html";
            } else {
                const erro = await resposta.text();
                alert(erro);
            }
        } catch (erro) {
            console.error(erro);
            alert("O erro real é: " + erro.message);
        }
    }

    // Executa ao carregar a página
    carregarPerfil();
</script>

</body>
</html>
