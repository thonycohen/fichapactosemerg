<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Meus Agentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. IMPORTAÇÃO DAS FONTES OFICIAIS (.otf) */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        /* 2. TIPOGRAFIA E FUNDO BASE */
        body {
            background-color: #000000; /* Fundo levemente puxado pro azul ultra-escuro */
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .fonte-leopold, .btn-blue, .ficha-name-new, .agentes-count {
            font-family: 'LeopoldMedium', sans-serif;
            letter-spacing: 1px;
        }

        /* 3. HEADER PRINCIPAL COM GRADIENTE AZUL FORTE */
        .pactos-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px;
            /* NOVO GRADIENTE: De um Preto-Azulado para um Azul Intenso e Vibrante */
            background: linear-gradient(90deg, #020617 0%, #1e3a8a 100%);
            border-bottom: 1px solid #1b48ae; /* Borda agora é um azul mais vivo */
            box-shadow: 0 4px 25px rgba(29, 78, 216, 0.4); /* Brilho da header mais azulado */
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 20px; z-index: 2;}

        /* O Botão Hambúrguer */
        .menu-btn {
            background: transparent; border: none; color: #0365da; /* Azul mais claro para destacar no fundo escuro */
            font-size: 2.2rem; cursor: pointer; transition: 0.3s;
        }
        .menu-btn:hover { color: #ffffff; transform: scale(1.1); text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* Centraliza a logo no meio absoluto da tela */
        .pactos-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .pactos-logo img {
            height: 45px; width: auto;
            filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.6)); /* Brilho azul mais forte na logo */
            mix-blend-mode: lighten; /* Mágica que remove o fundo preto do JPG */
        }

        /* Bolinha de Perfil na Header */
        .profile-pic-placeholder {
            width: 45px; height: 45px; background-color: #0f172a;
            border-radius: 50%; border: 2px solid #3b82f6;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            display: flex; justify-content: center; align-items: center;
        }
        .profile-pic-placeholder:hover { border-color: #60a5fa; transform: scale(1.1); box-shadow: 0 0 20px rgba(96, 165, 250, 0.8); }

        /* 4. DESIGN DO MENU LATERAL (SIDEBAR COM GRADIENTE FORTE) */
        .sidebar {
            height: 100vh; width: 0; position: fixed; top: 0; left: 0;
            /* NOVO GRADIENTE NO MENU */
            background: linear-gradient(180deg, #020617 0%, #1e3a8a 100%);
            border-right: 1px solid #3b82f6;
            box-shadow: 5px 0 25px rgba(29, 78, 216, 0.4);
            overflow-x: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1040; display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); }
        .sidebar-header img { width: 140px; filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.6)); mix-blend-mode: lighten; }
        .sidebar-menu { list-style: none; padding: 20px 0; margin: 0; flex-grow: 1; }
        .sidebar-menu li a {
            padding: 15px 30px; text-decoration: none; font-size: 1.2rem;
            color: #dbeafe; display: block; transition: 0.3s;
            font-family: 'LeopoldMedium', sans-serif; text-transform: uppercase;
        }
        .sidebar-menu li a:hover { color: #ffffff; background-color: rgba(59, 130, 246, 0.2); border-left: 5px solid #60a5fa; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .sidebar-menu li a.inativo { color: #64748b; cursor: default; }
        .sidebar-menu li a.inativo:hover { background-color: transparent; border-left: none; text-shadow: none;}
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(4px);
            z-index: 1030; display: none; opacity: 0; transition: opacity 0.4s;
        }
        .overlay.active { display: block; opacity: 1; }

        /* 5. ÁREA PRINCIPAL E CARTÕES */
        .pactos-main { padding: 40px 30px; max-width: 1400px; margin: 0 auto; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .agentes-count { font-size: 1.5rem; color: #bfdbfe; text-shadow: 0 0 8px rgba(59, 130, 246, 0.4); }

        .search-line {
            border: none; border-bottom: 2px solid #032660; background: transparent; color: white;
            border-radius: 0; padding: 8px 10px; width: 300px; outline: none; font-size: 1.1rem;
            transition: 0.3s;
        }
        .search-line:focus { border-color: #243957; box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3); }

        .btn-blue {
            background-color: #1b48ae; color: white; border: none; font-size: 1.2rem;
            padding: 10px 25px; transition: 0.3s; border-radius: 6px; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(11, 28, 62, 0.5);
        }
        .btn-blue:hover { background-color: #132750; color: white; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.6); }

        .fichas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        /* Design do Cartão de Ficha */
        .ficha-card {
            background-color: #0f172a; border: 1px solid #1e3a8a; border-radius: 12px;
            overflow: hidden; transition: 0.4s; position: relative;
            height: 320px; background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 20px;
            box-shadow: 0 10px 25px rgba(2, 6, 23, 0.8);
        }
        .ficha-card:hover { transform: translateY(-8px); border-color: #0b02a1; box-shadow: 0 15px 35px rgba(37, 99, 235, 0.5); }

        .ficha-info { transition: opacity 0.3s; width: 100%; pointer-events: none; z-index: 2; }
        .ficha-name-new { font-size: 2.2rem; color: white; margin-bottom: 4px; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }
        .ficha-sub-new { font-size: 1.1rem; color: #93c5fd; text-shadow: 1px 1px 5px rgba(0,0,0,0.9); font-weight: bold; }

        /* Overlay Escuro com os botões (Aparece no Hover) */
        .ficha-hover-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
            opacity: 0; transition: opacity 0.3s; z-index: 3;
        }
        .ficha-card:hover .ficha-info { opacity: 0; }
        .ficha-card:hover .ficha-hover-overlay { opacity: 1; }

        .btn-overlay { width: 80%; font-family: 'LeopoldMedium'; font-size: 1.2rem; }

        /* Cartão de Criar Novo */
        .ficha-card.novo-card {
            background-image: none !important; background-color: #0f172a; border: 2px dashed #1e3a8a;
            cursor: pointer; color: #00408a; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
        }
        .ficha-card.novo-card:hover { border-color: #0050af; color: #ffffff; background-color: #0e1b40; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        .ficha-card.novo-card svg { width: 60px; height: 60px; transition: 0.3s; }
        .ficha-card.novo-card:hover svg { transform: scale(1.1); }
        .ficha-card.novo-card div { font-family: 'LeopoldMedium'; font-size: 1.4rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="pactosSidebar" class="sidebar">
    <div class="sidebar-header">
        <img src="assets/PACTOS.png" alt="PACTOS RPG">
    </div>
    <ul class="sidebar-menu">
        <li><a href="home.html">INÍCIO</a></li>
        <li><a href="perfil.html">MEU PERFIL</a></li>
        <li><a href="fichas.html">AGENTES</a></li>
        <li><a href="#" class="inativo">CAMPANHAS (EM BREVE)</a></li>
    </ul>
    <div style="padding: 20px; border-top: 1px solid rgba(59, 130, 246, 0.3); margin-top: auto;">
        <button onclick="fazerLogout()" class="btn btn-outline-danger w-100" style="font-family: 'LeopoldMedium'; font-size: 1.2rem; border-width: 2px;">SAIR</button>
    </div>
</div>
<div id="menuOverlay" class="overlay" onclick="toggleMenu()"></div>

<header class="pactos-header">
    <div class="header-left">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

    <div class="pactos-logo">
        <img src="assets/PACTOS.png" alt="PACTOS RPG">
    </div>

    <div class="d-flex align-items-center" style="z-index: 2;">
        <a href="perfil.html" title="Meu Perfil" style="text-decoration: none;">
            <div class="profile-pic-placeholder text-secondary">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="#60a5fa"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"></path></svg>
            </div>
        </a>
    </div>
</header>

<main class="pactos-main">
    <div class="action-bar">
        <div class="agentes-count" id="contador-agentes">AGENTES: 0/15</div>
        <div class="d-flex gap-4 align-items-center">
            <input type="text" id="buscaAgentes" class="search-line" placeholder="Filtrar agentes pelo nome ou origem...">
            <button class="btn btn-blue" onclick="criarAgente()">NOVO AGENTE</button>
        </div>
    </div>

    <div class="fichas-grid" id="grid-fichas">
        <div class="ficha-card novo-card" id="btn-add-card" onclick="criarAgente()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"></path></svg>
            <div>Criar Novo Agente</div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- LÓGICA DO MENU HAMBÚRGUER ---
    function toggleMenu() {
        const sidebar = document.getElementById("pactosSidebar");
        const overlay = document.getElementById("menuOverlay");
        if (sidebar.style.width === "300px") {
            sidebar.style.width = "0";
            overlay.classList.remove("active");
            setTimeout(() => overlay.style.display = "none", 400);
        } else {
            overlay.style.display = "block";
            setTimeout(() => overlay.classList.add("active"), 10);
            sidebar.style.width = "300px";
        }
    }

    // --- LÓGICA DO SISTEMA INTACTA ---
    const maxAgentes = 15;
    let totalAgentes = 0;
    const usuarioLogado = localStorage.getItem('usuarioLogado');

    if (!usuarioLogado) {
        alert("Você precisa estar logado!");
        window.location.href = "login.html";
    }

    function atualizarContador() {
        document.getElementById('contador-agentes').innerText = `AGENTES: ${totalAgentes}/${maxAgentes}`;
    }

    async function carregarFichas() {
        try {
            const resposta = await fetch(`/api/agentes/listar/${usuarioLogado}`);
            const agentes = await resposta.json();
            totalAgentes = agentes.length;
            atualizarContador();
            agentes.forEach(agente => renderizarCarta(agente));
        } catch (erro) { console.error("Erro ao carregar agentes:", erro); }
    }

    async function carregarFotoDoCabecalho() {
        if (!usuarioLogado) return;
        try {
            const resposta = await fetch(`/api/usuarios/${usuarioLogado}`);
            if (resposta.ok) {
                const usuario = await resposta.json();
                if (usuario.fotoUrl) {
                    const divPerfil = document.querySelector('.profile-pic-placeholder');
                    divPerfil.style.backgroundImage = `url('${usuario.fotoUrl}')`;
                    divPerfil.style.backgroundSize = 'cover';
                    divPerfil.style.backgroundPosition = 'center';
                    divPerfil.innerHTML = '';
                }
            }
        } catch (erro) { console.error("Erro ao carregar foto do cabeçalho:", erro); }
    }

    function renderizarCarta(agente) {
        const cardId = `agente-${agente.id}`;
        // Fundo padrão agora é azul marinho super escuro
        const imagemFundo = agente.fotoUrl ? agente.fotoUrl : "https://via.placeholder.com/300x400/020617/1e3a8a?text=+";

        const novoAgenteHTML = `
            <div class="ficha-card" id="${cardId}" style="background-image: linear-gradient(to bottom, rgba(2,6,23,0.1) 40%, rgba(2,6,23,0.95)), url('${imagemFundo}');">
                <div class="ficha-info">
                    <div class="ficha-name-new">${agente.nome}</div>
                    <div class="ficha-sub-new">Nível ${agente.nivel || 0} • ${agente.origem || 'Desconhecida'}</div>
                </div>
                <div class="ficha-hover-overlay">
                    <a href="index.html?id=${agente.id}" class="btn btn-blue btn-overlay text-decoration-none text-center py-2">ENTRAR NA FICHA</a>
                    <button class="btn btn-danger btn-overlay py-2" style="font-family: 'LeopoldMedium';" onclick="excluirAgente(${agente.id}, event)">EXCLUIR</button>
                </div>
            </div>
        `;
        const btnAddCard = document.getElementById('btn-add-card');
        btnAddCard.insertAdjacentHTML('beforebegin', novoAgenteHTML);
    }

    async function criarAgente() {
        if (totalAgentes >= maxAgentes) { alert("Limite máximo atingido!"); return; }
        try {
            const resposta = await fetch(`/api/agentes/criar/${usuarioLogado}`, { method: 'POST' });
            if (resposta.ok) {
                const novoAgente = await resposta.json();
                renderizarCarta(novoAgente);
                totalAgentes++; atualizarContador();
            }
        } catch (erro) { console.error("Erro ao criar personagem:", erro); }
    }

    async function excluirAgente(id, event) {
        event.stopPropagation();
        if(confirm("Os registros deste pacto serão apagados. Tem certeza que deseja excluir?")) {
            try {
                await fetch(`/api/agentes/excluir/${id}`, { method: 'DELETE' });
                document.getElementById(`agente-${id}`).remove();
                totalAgentes--; atualizarContador();
            } catch (erro) { console.error("Erro ao excluir:", erro); }
        }
    }

    function fazerLogout() {
        if(confirm("Tem certeza que deseja sair da sua conta?")) {
            localStorage.removeItem('usuarioLogado');
            window.location.href = "login.html";
        }
    }

    // Filtro de pesquisa em tempo real
    document.getElementById('buscaAgentes').addEventListener('input', function(evento) {
        const textoPesquisa = evento.target.value.toLowerCase();
        const cartoes = document.querySelectorAll('.ficha-card:not(.novo-card)');
        cartoes.forEach(cartao => {
            const nomePersonagem = cartao.querySelector('.ficha-name-new').innerText.toLowerCase();
            const detalhesPersonagem = cartao.querySelector('.ficha-sub-new').innerText.toLowerCase();
            if (nomePersonagem.includes(textoPesquisa) || detalhesPersonagem.includes(textoPesquisa)) {
                cartao.style.display = 'flex';
            } else {
                cartao.style.display = 'none';
            }
        });
    });

    // Inicializa a página
    carregarFichas();
    carregarFotoDoCabecalho();
</script>
</body>
</html>
