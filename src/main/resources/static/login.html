<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* IMPORTAÇÃO DAS FONTES OFICIAIS */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;
        }

        /* Cartão de Login nos tons da ficha */
        .auth-card {
            background-color: #0f172a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e3a8a;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(2, 6, 23, 0.8);
        }

        .auth-title {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(30, 58, 138, 0.8);
            text-align: center;
            margin-bottom: 30px;
            font-family: 'LeopoldMedium', sans-serif;
            letter-spacing: 1px;
            font-size: 2rem;
        }

        /* Campos de texto padrão PACTOS */
        .form-control {
            background-color: #080b12;
            border: 1px solid #1e3a8a;
            color: white;
            transition: 0.3s;
            font-family: 'BloggerSansRegular', sans-serif;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 8px rgba(30, 58, 138, 0.5);
        }
        .form-label { color: #94a3b8; }

        /* Botão de Login Azul Escuro */
        .btn-blue {
            background-color: #1e3a8a;
            color: white;
            border: none;
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.2rem;
            transition: 0.3s;
            border-radius: 6px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(11, 28, 62, 0.5);
        }
        .btn-blue:hover {
            background-color: #1d4ed8;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.6);
        }

        .text-blue { color: #3b82f6 !important; text-decoration: none; transition: 0.3s; }
        .text-blue:hover { color: #60a5fa !important; text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 class="auth-title">ACESSAR CONTA</h2>

    <form onsubmit="entrarNoSistema(event)">
        <div class="mb-3">
            <label for="nomeUsuarioLogin" class="form-label">Nome de Usuário</label>
            <input type="text" class="form-control" id="nomeUsuarioLogin" required>
        </div>

        <div class="mb-4">
            <label for="senhaLogin" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senhaLogin" required>
        </div>

        <button type="submit" class="btn btn-blue w-100 py-2 mb-3">ENTRAR</button>

        <div class="text-center mt-3">
            <span class="text-secondary">Não tem uma conta?</span>
            <a href="register.html" class="text-blue fw-bold">Registre-se</a>
        </div>
    </form>
</div>

<script>
    async function entrarNoSistema(event) {
        event.preventDefault();

        const nome = document.getElementById('nomeUsuarioLogin').value;
        const senha = document.getElementById('senhaLogin').value;

        const dadosLogin = {
            nomeUsuario: nome,
            senha: senha
        };

        try {
            const resposta = await fetch('/api/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dadosLogin)
            });

            const textoRetorno = await resposta.text();

            if (resposta.ok) {
                localStorage.setItem('usuarioLogado', nome);
                window.location.href = "fichas.html";
            } else {
                alert(textoRetorno);
            }
        } catch (erro) {
            console.error(erro);
            alert("O servidor do PACTOS está offline.");
        }
    }
</script>

</body>
</html>
