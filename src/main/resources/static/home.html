<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Bem-vindo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. IMPORTAÇÃO DAS FONTES OFICIAIS */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        /* 2. FUNDO E LAYOUT BASE */
        body {
            background-color: #000000; /* Fundo Escuro Base */
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* Um brilho misterioso de fundo bem subtil atrás da logo */
        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vh;
            background: radial-gradient(circle, rgba(30, 58, 138, 0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* 3. TÍTULO E LOGO */
        .welcome-text {
            font-family: 'LeopoldMedium', sans-serif;
            font-weight: normal;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(30, 58, 138, 0.8); /* Sombra azul marinho */
            margin-bottom: 20px;
            z-index: 2;
        }

        .logo-placeholder {
            max-width: 450px; /* Tamanho para dar destaque à logo nova */
            width: 100%;
            margin-bottom: 50px;
            z-index: 2;
            display: flex;
            justify-content: center;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(30, 58, 138, 0.5));
            /* mix-blend-mode: lighten; (Descomente caso a logo PACTOS.png tenha fundo preto grudado nela) */
        }

        /* 4. BOTÕES AZUIS DO DESIGN */
        .botoes-container {
            display: flex;
            gap: 25px;
            z-index: 2;
        }

        /* Botão ENTRAR (Sólido) */
        .btn-blue {
            background-color: #1e3a8a;
            color: #ffffff;
            border: 2px solid #1e3a8a;
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            padding: 10px 0;
            width: 180px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(11, 28, 62, 0.6);
        }
        .btn-blue:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(29, 78, 216, 0.6);
        }

        /* Botão REGISTRE-SE (Vazado/Outline) */
        .btn-outline-blue {
            background-color: transparent;
            color: #60a5fa; /* Texto em azul claro */
            border: 2px solid #1e3a8a; /* Borda azul marinho */
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            padding: 10px 0;
            width: 180px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-outline-blue:hover {
            background-color: #1e3a8a;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.5);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<h1 class="welcome-text">SEJAM BEM VINDOS</h1>

<div class="logo-placeholder">
    <img src="assets/PACTOS.png" alt="PACTOS O RPG">
</div>

<div class="botoes-container">
    <a href="login.html" class="btn-blue">ENTRAR</a>
    <a href="register.html" class="btn-outline-blue">REGISTRE-SE</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
