<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Bem-vindo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. IMPORTAÇÃO DAS FONTES OFICIAIS */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        /* 2. FUNDO E LAYOUT BASE */
        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* Brilho misterioso de fundo (ajustado para a cor do seu botão) */
        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vh;
            background: radial-gradient(circle, rgba(58, 58, 255, 0.15) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* 3. TÍTULO E LOGO */
        .welcome-text {
            font-family: 'LeopoldMedium', sans-serif;
            font-weight: normal;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(58, 58, 255, 0.8);
            margin-bottom: 20px;
            z-index: 2;
        }

        .logo-placeholder {
            max-width: 450px;
            width: 100%;
            margin-bottom: 50px;
            z-index: 2;
            display: flex;
            justify-content: center;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(106, 106, 255, 0.5));
        }

        /* 4. BOTÕES PERSONALIZADOS (Criados por Você) */
        .botoes-container {
            display: flex;
            gap: 25px;
            z-index: 2;
        }

        /* Botão ENTRAR (Fade para a Esquerda) */
        .btn-blue {
            padding: 10px 36px;
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(to left, #7a97f3 0%, #7597ff 50%, rgba(106, 106, 255, 0) 100%);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            min-width: 180px;
            border: none; /* Mantive o seu border: none no final, pois anula a linha dura e deixa o fade liso */
            text-align: center;
            text-decoration: none;
        }

        .btn-blue:hover {
            background: linear-gradient(135deg, #4a4aff 0%, #8a8aff 40%, #6a6aff 60%, #4242c6 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 14px rgba(60,60,255,0.5);
            transform: translateY(-1px);
            color: #ffffff;
        }

        .btn-blue:active {
            transform: translateY(0);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Botão REGISTRE-SE (Fade para a Direita - Espelhado) */
        .btn-outline-blue {
            padding: 10px 36px;
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(to right, #3a3aff 0%, #6a6aff 50%, rgba(106, 106, 255, 0) 100%);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            min-width: 180px;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-outline-blue:hover {
            background: linear-gradient(135deg, #4a4aff 0%, #8a8aff 40%, #6a6aff 60%, #4a4add 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 14px rgba(60,60,255,0.5);
            transform: translateY(-1px);
            color: #ffffff;
        }

        .btn-outline-blue:active {
            transform: translateY(0);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<h1 class="welcome-text">SEJAM BEM VINDOS</h1>

<div class="logo-placeholder">
    <img src="assets/PACTOS.png" alt="PACTOS O RPG">
</div>

<div class="botoes-container">
    <a href="login.html" class="btn-blue">ENTRAR</a>
    <a href="register.html" class="btn-outline-blue">REGISTRE-SE</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
