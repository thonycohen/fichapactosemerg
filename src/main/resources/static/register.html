<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Registrar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        /* IMPORTAÇÃO DAS FONTES OFICIAIS */
        @font-face {
            font-family: 'LeopoldMedium';
            src: url('fonts/Leopold.otf') format('opentype');
        }
        @font-face {
            font-family: 'BloggerSansRegular';
            src: url('fonts/BloggerSans.otf') format('opentype');
        }

        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'BloggerSansRegular', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px 0;
        }

        .auth-card {
            background-color: #0f172a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1e3a8a;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(2, 6, 23, 0.8);
        }

        .auth-title {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(30, 58, 138, 0.8);
            text-align: center;
            margin-bottom: 30px;
            font-family: 'LeopoldMedium', sans-serif;
            letter-spacing: 1px;
            font-size: 2rem;
        }

        .form-control {
            background-color: #080b12;
            border: 1px solid #1e3a8a;
            color: white;
            transition: 0.3s;
            font-family: 'BloggerSansRegular', sans-serif;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 8px rgba(30, 58, 138, 0.5);
        }
        .form-label { color: #94a3b8; }

        .btn-blue {
            background-color: #1e3a8a;
            color: white;
            border: none;
            font-family: 'LeopoldMedium', sans-serif;
            font-size: 1.2rem;
            transition: 0.3s;
            border-radius: 6px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(11, 28, 62, 0.5);
        }
        .btn-blue:hover {
            background-color: #1d4ed8;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.6);
        }

        .text-blue { color: #3b82f6 !important; text-decoration: none; transition: 0.3s; }
        .text-blue:hover { color: #60a5fa !important; text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 class="auth-title">CRIAR CONTA</h2>

    <form onsubmit="cadastrarUsuario(event)">

        <div class="mb-3">
            <label class="form-label">Nome de Usuário</label>
            <input type="text" class="form-control" id="nomeReg" required>
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" id="emailReg" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="senhaReg" required>
        </div>

        <div class="mb-4 d-flex justify-content-center">
            <div class="g-recaptcha" data-sitekey="6LdYc-AqAAAAAOL076k7Z2aZ4D8qZ1oD-hH1hFjL" data-theme="dark"></div>
        </div>

        <button type="submit" class="btn btn-blue w-100 py-2 mb-3">REGISTRAR</button>

        <div class="text-center mt-3">
            <span class="text-secondary">Já possui uma conta?</span>
            <a href="login.html" class="text-blue fw-bold">Faça login</a>
        </div>
    </form>
</div>

<script>
    async function cadastrarUsuario(event) {
        event.preventDefault();

        // 1. Pega os dados dos campos de texto
        const nome = document.getElementById('nomeReg').value;
        const email = document.getElementById('emailReg').value;
        const senha = document.getElementById('senhaReg').value;

        // 2. Pega a resposta do Google reCAPTCHA
        const tokenDoGoogle = grecaptcha.getResponse();

        // 3. Verifica se o jogador marcou a caixinha
        if (!tokenDoGoogle) {
            alert("Por favor, confirme que você não é um robô!");
            return;
        }

        const dadosUsuario = {
            nomeUsuario: nome,
            email: email,
            senha: senha
        };

        try {
            // 4. Envia os dados e o "token" para o nosso servidor Java
            const urlComToken = `/api/usuarios/registrar?g-recaptcha-response=${encodeURIComponent(tokenDoGoogle)}`;

            const resposta = await fetch(urlComToken, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dadosUsuario)
            });

            // 5. Verifica a resposta do Java
            const textoRetorno = await resposta.text();

            if (resposta.ok) {
                alert(textoRetorno); // Sucesso!
                window.location.href = "login.html"; // Manda o usuário para a tela de login
            } else if (resposta.status === 403) {
                alert("O Google detectou uma anomalia (Robô). Tente novamente.");
                grecaptcha.reset();
            } else {
                alert(textoRetorno);
                grecaptcha.reset();
            }
        } catch (erro) {
            console.error(erro);
            alert("O servidor do PACTOS está offline.");
        }
    }
</script>

</body>
</html>
